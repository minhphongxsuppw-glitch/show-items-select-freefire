<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena FF - Bộ Sưu Tập Bom Keo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>BOM KEO GALLERY</h1>
            <p class="subtitle">Khám phá bộ sưu tập Bom Keo độc đáo của bạn</p>
        </header>

        <main id="gallery" class="gallery-grid">
            <!-- Images will be loaded here by script.js -->
        </main>

        <div class="pagination">
            <button id="prevBtn" class="btn-page" disabled>Trang trước</button>
            <span id="pageInfo" class="page-info">Trang 1 / 1</span>
            <button id="nextBtn" class="btn-page">Trang sau</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
